name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub App token
        id: app-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.GH_APP_ID }}
          private_key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Set pending status
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            await github.rest.repos.createCommitStatus({
              ...context.repo,
              sha: context.sha,
              state: 'pending',
              context: 'Deploy',
              description: 'Deployment queued'
            });

      - name: Trigger Coolify deployment
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          echo "Triggering deployment..."
          response=$(curl -s -X GET "${{ secrets.DEPLOY_WEBHOOK }}" \
            -H "Authorization: Bearer $COOLIFY_TOKEN") || true
          echo "Response: $response"

      - name: Set building status
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            await github.rest.repos.createCommitStatus({
              ...context.repo,
              sha: context.sha,
              state: 'pending',
              context: 'Deploy',
              description: 'Building and deploying...'
            });

      - name: Wait for deployment
        id: wait
        env:
          COOLIFY_URL: ${{ secrets.COOLIFY_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_APP_UUID: ${{ secrets.COOLIFY_APP_UUID }}
        run: |
          result="failure"
          echo "Polling Coolify for deployment completion..."

          for ((i=1; i<=60; i++)); do
            # Check if deployments endpoint shows any active deployments
            response=$(curl -s -H "Authorization: Bearer $COOLIFY_TOKEN" \
              "$COOLIFY_URL/api/v1/deployments?appId=$COOLIFY_APP_UUID&limit=5") || true

            count=$(echo "$response" | jq -r 'if type == "array" then length else 0 end' 2>/dev/null)
            echo "[$i/60] Active deployments: $count"

            if [ "$count" = "0" ] || [ -z "$count" ]; then
              echo "No active deployments detected, checking app status..."
              sleep 10
              break
            fi

            sleep 15
          done

          # Check final app status
          sleep 10
          app_response=$(curl -s -H "Authorization: Bearer $COOLIFY_TOKEN" \
            "$COOLIFY_URL/api/v1/applications/$COOLIFY_APP_UUID") || true

          status=$(echo "$app_response" | jq -r '.status // "unknown"' 2>/dev/null)
          echo "Final app status: $status"

          if [ "$status" = "running:healthy" ]; then
            result="success"
          else
            echo "Full app response: $(echo "$app_response" | jq -c '{status, name, updated_at}' 2>/dev/null || echo "$app_response")"
          fi

          echo "result=$result" >> $GITHUB_OUTPUT

      - if: steps.wait.outputs.result == 'success'
        name: Set success status
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            await github.rest.repos.createCommitStatus({
              ...context.repo,
              sha: context.sha,
              state: 'success',
              context: 'Deploy',
              description: 'Deployed successfully'
            });

      - if: steps.wait.outputs.result != 'success'
        name: Set failure status
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            await github.rest.repos.createCommitStatus({
              ...context.repo,
              sha: context.sha,
              state: 'failure',
              context: 'Deploy',
              description: 'Deployment failed'
            });
